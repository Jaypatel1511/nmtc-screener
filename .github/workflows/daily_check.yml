name: Daily Health Check

on:
  schedule:
    - cron: '0 9 * * *'    # 9am UTC = 3am Chicago time
  workflow_dispatch:         # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy requests openpyxl aiohttp tqdm
        pip install pip-audit safety

    - name: Install package
      run: |
        pip install -e . 2>/dev/null || pip install . 2>/dev/null || true

    - name: Run tests
      id: tests
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: Check for outdated dependencies
      id: outdated
      run: |
        pip list --outdated --format=json > outdated.json
        cat outdated.json

    - name: Security audit
      id: audit
      run: |
        pip-audit --format=json -o audit.json 2>/dev/null || true
        cat audit.json 2>/dev/null || echo "No audit results"
      continue-on-error: true

    - name: Open issue if tests fail
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          let testOutput = '';
          try {
            testOutput = fs.readFileSync('test_output.txt', 'utf8').slice(-3000);
          } catch(e) {}

          const title = `🔴 Daily Health Check Failed — ${new Date().toISOString().split('T')[0]}`;
          const body = `## Daily Health Check Failed

          **Python Version:** ${{ matrix.python-version }}
          **Date:** ${new Date().toISOString().split('T')[0]}
          **Workflow:** [View Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

          ## Test Output (last 3000 chars)
          \`\`\`
          ${testOutput}
          \`\`\`

          ## Action Required
          - Review failing tests above
          - Fix locally and push
          - Tests will re-run automatically

          *This issue was opened automatically by the Daily Health Check workflow.*`;

          // Check if issue already exists today
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'daily-check'
          });

          const today = new Date().toISOString().split('T')[0];
          const existing = issues.data.find(i => i.title.includes(today));

          if (!existing) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['daily-check', 'bug']
            });
          }

  version-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Check PyPI version matches repo
      run: |
        pip install requests tomllib 2>/dev/null || pip install requests 2>/dev/null
        python3 << 'PYEOF'
        import re, json, sys

        try:
            import tomllib
        except ImportError:
            import tomli as tomllib

        # Read local version
        local_version = None
        try:
            with open('pyproject.toml', 'rb') as f:
                data = tomllib.load(f)
            local_version = data.get('project', {}).get('version')
        except Exception:
            pass

        if not local_version:
            try:
                with open('setup.py') as f:
                    content = f.read()
                match = re.search(r'version=["\']([^"\']+)["\']', content)
                if match:
                    local_version = match.group(1)
            except Exception:
                pass

        if not local_version:
            print("Could not determine local version")
            sys.exit(0)

        # Read package name
        pkg_name = None
        try:
            with open('pyproject.toml', 'rb') as f:
                data = tomllib.load(f)
            pkg_name = data.get('project', {}).get('name')
        except Exception:
            pass

        if not pkg_name:
            print("Could not determine package name")
            sys.exit(0)

        # Check PyPI
        import urllib.request
        try:
            url = f"https://pypi.org/pypi/{pkg_name}/json"
            with urllib.request.urlopen(url, timeout=10) as r:
                pypi_data = json.loads(r.read())
            pypi_version = pypi_data['info']['version']
            print(f"Package: {pkg_name}")
            print(f"Local version:  {local_version}")
            print(f"PyPI version:   {pypi_version}")
            if local_version != pypi_version:
                print(f"WARNING: Version mismatch — local={local_version}, PyPI={pypi_version}")
            else:
                print("OK: Versions match")
        except Exception as e:
            print(f"Could not check PyPI: {e}")
        PYEOF
